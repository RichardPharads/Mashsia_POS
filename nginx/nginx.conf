# nginx/nginx.conf

events {
    worker_connections 1024;
}

http {
    # ── Shared proxy settings ──────────────────────────────────────────
    proxy_http_version      1.1;
    proxy_set_header        Host              $host;
    proxy_set_header        X-Real-IP         $remote_addr;
    proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header        X-Forwarded-Proto $scheme;
    proxy_set_header        Upgrade           $http_upgrade;
    proxy_set_header        Connection        "upgrade";  # needed for WebSocket
    proxy_read_timeout      60s;
    proxy_connect_timeout   10s;

    # ── Dashboard — port 80 default ────────────────────────────────────
    server {
        listen 80;
        server_name _;   # catches any hostname or IP

        # Next.js dashboard
        location / {
            proxy_pass http://dashboard:4000;
        }

        # API routes
        location /api/ {
            proxy_pass http://api:3000;
        }

        # WebSocket for Socket.io
        location /socket.io/ {
            proxy_pass http://api:3000;
        }

        # MinIO file access (product images)
        location /files/ {
            rewrite ^/files/(.*)$ /$1 break;
            proxy_pass http://minio:9000;
        }

        # MinIO admin console
        location /minio-console/ {
            rewrite ^/minio-console/(.*)$ /$1 break;
            proxy_pass http://minio:9001;
        }

        # ChromaDB (internal use only — no public exposure needed)
        # Uncomment only if you need direct ChromaDB access
        # location /chroma/ {
        #     proxy_pass http://chromadb:8000;
        # }
    }
}