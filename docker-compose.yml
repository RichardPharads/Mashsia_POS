services:

  nginx:
    image: nginx:latest
    container_name: pos_nginx
    restart: unless-stopped
    
    ports:
      - "80:80"       # only port exposed to outside world
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    
    depends_on:
      - dashboard
      - api
      - minio
      - chromadb
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: pos_tunnel
    command: tunnel --no-autoupdate run
    depends_on:
      - nginx
    

  postgres:
    image: postgres:16-alpine
    container_name: pos_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     pos
      POSTGRES_PASSWORD: pospassword
      POSTGRES_DB:       posdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # No ports: exposed — only accessible inside Docker network

  redis:
    image: redis:7-alpine
    container_name: pos_redis
    restart: unless-stopped
    # No ports: exposed

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: pos_api
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    env_file:
      - ./apps/api/.env
    environment:
      DATABASE_URL: postgres://pos:pospassword@pos_postgres:5432/posdb
      REDIS_URL:    redis://redis:6379
    # No ports: exposed — nginx proxies /api/ to this

  dashboard:
    build:
      context: ./apps/dashboard
      dockerfile: Dockerfile
    container_name: pos_dashboard
    restart: unless-stopped
    depends_on:
      - api
    env_file:
      - ./apps/dashboard/.env
    environment:
      API_URL: http://api:3000
    # No ports: exposed — nginx proxies / to this

  chromadb:
    image: chromadb/chroma:latest
    container_name: pos_chromadb
    restart: unless-stopped
    volumes:
      - chroma_data:/chroma
    # No ports: exposed — internal only

  minio:
    image: minio/minio:latest
    container_name: pos_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     posminio
      MINIO_ROOT_PASSWORD: posminiopassword
    volumes:
      - minio_data:/data
    # No ports: exposed — nginx proxies /files/ to this

volumes:
  postgres_data:
  chroma_data:
  minio_data: