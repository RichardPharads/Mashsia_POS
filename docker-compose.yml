services:
  postgres:
    image: postgres:16-alpine
    container_name: pos_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: pos
      POSTGRES_PASSWORD: pospassword
      POSTGRES_DB: posdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: pos_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: pos_api
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    env_file:
      - ./apps/api/.env
    environment:
      DATABASE_URL: postgres://pos:pospassword@postgres:5432/posdb
      REDIS_URL: redis://redis:6379
    ports:
      - "3000:3000"

  dashboard:
    build:
      context: ./apps/dashboard
      dockerfile: Dockerfile
    container_name: pos_dashboard
    restart: unless-stopped
    depends_on:
      - api
    env_file:
      - ./apps/dashboard/.env
    environment:
      API_URL: http://api:3000
    ports:
      - "4000:4000"

  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: pos_ollama
  #   restart: unless-stopped
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama_data:/root/.ollama

  #   healthcheck: # Required for the loader to wait
  #     # Use the ollama CLI (present in the image) instead of curl.
  #     test: ["CMD", "ollama", "list"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5
  # model-loader:
  #   image: curlimages/curl:latest
  #   depends_on:
  #     ollama:
  #       condition: service_healthy
  #   # Sends a pull request to the ollama service
  #   entrypoint: >
  #     sh -c "curl -X POST http://ollama:11434/api/pull -d '{\"name\": \"llama3.2\"}'"

  chromadb:
    image: chromadb/chroma:latest
    container_name: pos_chromadb
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma

  minio:
    image: minio/minio:latest
    container_name: pos_minio
    restart: unless-stopped
    command: server /data
    environment:
      MINIO_ROOT_USER: posminio
      MINIO_ROOT_PASSWORD: posminiopassword
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  chroma_data:
  minio_data: